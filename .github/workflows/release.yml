name: Build and release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set version
        id: version
        run: |
          echo "code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "name=0.1.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        env:
          APP_VERSION_CODE: ${{ steps.version.outputs.code }}
          APP_VERSION_NAME: ${{ steps.version.outputs.name }}
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk \
             dist/UnboundDS-companion-v${{ steps.version.outputs.name }}.apk

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}
          name: v${{ steps.version.outputs.name }}
          files: dist/*.apk
